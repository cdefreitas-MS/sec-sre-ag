# ═══════════════════════════════════════════════════════════════════
# Sentinel Ingestion Report — Query Definitions
# ═══════════════════════════════════════════════════════════════════
# All queries used by invoke_ingestion_scan.py, grouped by phase.
# Documents are separated by '---'.  Each document has an 'id',
# 'phase', 'type', and the relevant query/url/endpoint fields.
# ═══════════════════════════════════════════════════════════════════

# ─── Phase 1: Usage Summary ──────────────────────────────────────

id: ingestion-q1
name: Usage by DataType with Billing Breakdown
description: Top 20 tables ranked by billable volume with solution mapping
phase: 1
type: kql
timespan: P{days}D
query: |
  Usage
  | where TimeGenerated > ago({days}d)
  | summarize
      TotalGB = round(sum(Quantity) / 1024, 3),
      BillableGB = round(sumif(Quantity, IsBillable == true) / 1024, 3),
      NonBillableGB = round(sumif(Quantity, IsBillable == false) / 1024, 3),
      DayCount = dcount(bin(TimeGenerated, 1d))
      by DataType, Solution
  | extend AvgDailyGB = iff(DayCount > 0, round(BillableGB / toreal(DayCount), 3), 0.0)
  | project-away DayCount
  | order by BillableGB desc
  | take 20

---

id: ingestion-q2
name: Daily Ingestion Trend
description: Daily ingestion trend for pattern analysis and peak/min detection
phase: 1
type: kql
timespan: P{days}D
query: |
  Usage
  | where TimeGenerated > ago({days}d)
  | summarize DailyGB = round(sum(Quantity) / 1024, 3) by bin(TimeGenerated, 1d)
  | order by TimeGenerated asc

---

id: ingestion-q3
name: Workspace Ingestion Summary
description: Executive summary metrics - table count, billable totals, daily average
phase: 1
type: kql
timespan: P{days}D
query: |
  Usage
  | where TimeGenerated > ago({days}d)
  | summarize
      TotalTableCount = dcount(DataType),
      TotalGB = round(sum(Quantity) / 1024, 3),
      BillableGB = round(sumif(Quantity, IsBillable == true) / 1024, 3),
      NonBillableGB = round(sumif(Quantity, IsBillable == false) / 1024, 3),
      DayCount = dcount(bin(TimeGenerated, 1d)),
      AvgDailyGB = round(sum(Quantity) / 1024 / dcount(bin(TimeGenerated, 1d)), 3),
      BillableTableCount = dcountif(DataType, IsBillable == true)
  | extend BillablePercent = round(100.0 * BillableGB / TotalGB, 1)

# ─── Phase 2: Deep Dives ─────────────────────────────────────────

---

id: ingestion-q4
name: SecurityEvent by Computer
description: Top 25 computers by SecurityEvent volume. Identifies noisy endpoints for DCR filtering.
phase: 2
type: kql
timespan: P{deepDiveDays}D
query: |
  let _total = toscalar(SecurityEvent | where TimeGenerated > ago({deepDiveDays}d) | summarize round(sum(estimate_data_size(*)) / 1024.0 / 1024.0 / 1024.0, 4));
  let _totalServers = toscalar(SecurityEvent | where TimeGenerated > ago({deepDiveDays}d) | summarize dcount(Computer));
  SecurityEvent
  | where TimeGenerated > ago({deepDiveDays}d)
  | summarize
      EventCount = count(),
      EstimatedGB = round(sum(estimate_data_size(*)) / 1024.0 / 1024.0 / 1024.0, 4)
      by Computer
  | extend
      PercentOfTotal = iff(_total > 0, round(100.0 * EstimatedGB / _total, 1), 0.0),
      TotalServers = _totalServers
  | order by EstimatedGB desc
  | take 25

