# =============================================================================
# incident-triage вҖ” collector + scoring (single source of truth)
# Pattern: collectorвҶ”renderer. This file = CAPTURE + SCORING. generate_html_report.py = RENDER.
# One-shot, autonomous, deterministic triage report for a SINGLE incident:
#   header вҶ’ alerts вҶ’ entities вҶ’ MITRE tagging (shared/mitre_map.py) вҶ’
#   gated response plan (shared/action_safety.py) вҶ’ verdict + next action.
# Complements (does NOT replace) the interactive, multi-phase `incident-investigation`.
# Read-only (GET/query). NГғO muta nada. Placeholders: {sub} {rg} {ws_guid} {window_days} {lookback_days} {incident_number}
# =============================================================================
metadata:
  skill: incident-triage
  title: Incident Triage вҖ” One-Shot Autonomous Brief
  description: >
    RelatГіrio determinГӯstico de triagem de UM incidente do Sentinel/Defender XDR, pensado
    para o loop autГҙnomo (sem analista no meio). Coleta o cabeГ§alho do incidente + alertas
    relacionados, extrai entidades (usuГЎrios/hosts/IPs), TAGUEIA as tГ©cnicas MITRE
    (tГЎticas nativas dos alertas + inferГӘncia por texto via shared/mitre_map.py), monta um
    PLANO DE RESPOSTA recomendado por tipo de entidade com o GATE de risco de cada aГ§ГЈo
    (shared/action_safety.py), e fecha com um veredito (TRUE POSITIVE PROVГҒVEL / REQUER
    ANГҒLISE / PROVГҒVEL BENIGNO) + a prГіxima aГ§ГЈo. CollectorвҶ”renderer; HTML (dark, email) +
    Markdown (repo) + entrega tripla. Distinto do incident-investigation interativo.

parameters:
  window_days: 7        # janela usada para escolher o incidente padrГЈo (mais recente high-sev aberto)
  lookback_days: 90     # janela para buscar um incidente especГӯfico + seus alertas (mais generosa)

# -----------------------------------------------------------------------------
# COLLECTOR вҖ” capture read-only. No SRE Agent: KQL via QueryLogAnalyticsByWorkspaceId
# (monitor MCP) ou `az monitor log-analytics query`. Modo B (prefetch JSON + --from-json)
# Г© o primГЎrio/determinГӯstico. Tabelas jГЎ validadas ao vivo no LA-HERBEST.
# -----------------------------------------------------------------------------
collector:
  kql:
    # Sem incident_number: escolhe o incidente mais recente HIGH e aberto (degrada p/ aberto, depois recente).
    pick_incident: |
      SecurityIncident
      | where TimeGenerated > ago({window_days}d)
      | summarize arg_max(TimeGenerated, *) by IncidentNumber
      | where Status != "Closed"
      | extend SevRank = case(Severity == "High", 0, Severity == "Medium", 1, Severity == "Low", 2, 3)
      | sort by SevRank asc, CreatedTime desc
      | take 1
      | project IncidentNumber

    # CabeГ§alho do incidente especГӯfico (Гәltimo estado).
    incident_header: |
      SecurityIncident
      | where TimeGenerated > ago({lookback_days}d)
      | where IncidentNumber == {incident_number}
      | summarize arg_max(TimeGenerated, *) by IncidentNumber
      | project IncidentNumber, Title, Severity, Status,
                Classification = tostring(Classification),
                ClassificationReason = tostring(ClassificationReason),
                Owner = tostring(parse_json(Owner).assignedTo),
                CreatedTime, ClosedTime,
                AlertIds, IncidentUrl,
                Description = tostring(Description),
                ProviderName,
                AlertsCount = array_length(AlertIds)

    # Alertas relacionados ao incidente (via AlertIds вҶ’ SystemAlertId).
    incident_alerts: |
      SecurityIncident
      | where TimeGenerated > ago({lookback_days}d)
      | where IncidentNumber == {incident_number}
      | summarize arg_max(TimeGenerated, *) by IncidentNumber
      | mv-expand AlertId = todynamic(AlertIds) to typeof(string)
      | project AlertId
      | join kind=inner (
          SecurityAlert
          | where TimeGenerated > ago({lookback_days}d)
          | summarize arg_max(TimeGenerated, *) by SystemAlertId
        ) on $left.AlertId == $right.SystemAlertId
      | extend Tactics = tostring(Tactics)
      | project AlertName, AlertSeverity, Status, Tactics, ProductName, TimeGenerated, Entities
      | order by AlertSeverity asc, TimeGenerated desc

# -----------------------------------------------------------------------------
# MITRE вҖ” o renderer combina as TГҒTICAS NATIVAS dos alertas (campo Tactics) com a
# INFERГҠNCIA por texto (tГӯtulo do incidente + nomes dos alertas) feita pelo utilitГЎrio
# compartilhado shared/mitre_map.py (subprocesso). Degrada p/ sГі-nativo se o util sumir.
# -----------------------------------------------------------------------------
mitre:
  shared_util: mitre_map.py        # invocado como subprocesso: `python <shared>/mitre_map.py map "<texto>"`

# -----------------------------------------------------------------------------
# RESPONSE PLAYBOOK вҖ” aГ§Гөes recomendadas por tipo de entidade afetada. Cada aГ§ГЈo Г©
# passada pelo GATE de risco do utilitГЎrio compartilhado shared/action_safety.py
# (risco/aprovaГ§ГЈo/rollback/guardrails). NADA Г© executado вҖ” o relatГіrio sГі RECOMENDA.
# -----------------------------------------------------------------------------
response_playbook:
  shared_util: action_safety.py    # invocado como subprocesso: `python <shared>/action_safety.py list`
  by_entity:
    user: [revoke_user_sessions, disable_ad_account, force_password_reset]
    host: [isolate_device, run_antivirus_scan, collect_investigation_package]
    ip:   [update_incident_status]
  always: [add_incident_comment, update_incident_status]

# -----------------------------------------------------------------------------
# VERDICT вҖ” heurГӯstica determinГӯstica (reproduzida no relatГіrio).
#   TRUE POSITIVE PROVГҒVEL: classificaГ§ГЈo jГЎ = TruePositive, OU (Severity High e вүҘ1 alerta high e nГЈo fechado).
#   PROVГҒVEL BENIGNO/FP:    classificaГ§ГЈo = BenignPositive/FalsePositive, OU (Severity Low e 0 alerta high).
#   REQUER ANГҒLISE:         o resto.
# -----------------------------------------------------------------------------
verdict:
  true_positive: { label: "TRUE POSITIVE PROVГҒVEL", emoji: "рҹ”ҙ" }
  needs_review:  { label: "REQUER ANГҒLISE",         emoji: "рҹҹЎ" }
  benign:        { label: "PROVГҒVEL BENIGNO / FP",  emoji: "рҹҹў" }

# -----------------------------------------------------------------------------
# DELIVERY вҖ” entrega tripla (consistente com a suГӯte). O renderer sГі monta o HTML/MD;
# o envio (email Г— 2 + Teams) Г© feito pelas skills send-email-report / send-teams-notification.
# -----------------------------------------------------------------------------
delivery:
  subject_prefix: "[SOC Triage]"
  recipients_key: default_recipients   # lido do config.json (2 destinatГЎrios)
