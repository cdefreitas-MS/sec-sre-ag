# =============================================================================
# advisor-impact вЂ” collector + scoring (single source of truth)
# Pattern: collectorв†”renderer. This file = CAPTURE + RISK BASELINE. generate_html_report.py = RENDER.
# Planejador de remediaГ§ГЈo que une Azure Advisor + Microsoft Defender for Cloud:
#   recomendaГ§Гµes в†’ risk-rate (disrupГ§ГЈo) + cascata em workloads dependentes
#   в†’ plano de execuГ§ГЈo FASEADO (safe в†’ high/approval). 100% READ-ONLY (GET ARM).
# Placeholders: {sub} {rg}
# =============================================================================
metadata:
  skill: advisor-impact
  title: Advisor + Defender for Cloud вЂ” Remediation Impact Planner
  description: >
    Une as recomendaГ§Гµes do Azure Advisor (Cost/Reliability/Performance/OperationalExcellence)
    com as recomendaГ§Гµes de seguranГ§a do Microsoft Defender for Cloud (Microsoft.Security
    assessments + secure score) e, cruzando com o inventГЎrio de recursos do resource group,
    classifica o RISCO DE APLICAR cada uma (safe/low/medium/high por padrГЈo de disrupГ§ГЈo),
    monta a CADEIA DE CASCATA (recurso muda в†’ workloads dependentes podem reiniciar) e entrega
    um PLANO DE EXECUГ‡ГѓO FASEADO (quick wins в†’ janela de manutenГ§ГЈo в†’ aprovaГ§ГЈo+rollback).
    Collectorв†”renderer; HTML (dark, email) + Markdown + entrega tripla. 100% read-only вЂ” RECOMENDA,
    nunca aplica. Processo re-implementado de um helper interno de Azure mgmt (nГЈo verbatim).

parameters:
  category: all          # Advisor: Cost|Security|Reliability|OperationalExcellence|Performance|all
  include_healthy: false # Defender for Cloud: por padrГЈo sГі assessments Unhealthy (recomendaГ§Гµes abertas)
  top: 200

# -----------------------------------------------------------------------------
# COLLECTOR вЂ” ARM REST (GET). No SRE Agent: `az rest --method get --url <mgmt-url>` (RunAzCliReadCommands)
# OU monitor/azure MCP. Modo B (prefetch JSON + --from-json) Г© o primГЎrio/determinГ­stico.
# A UAMI/identidade precisa de READER no escopo (subscription/RG) вЂ” diferente das perms Sentinel/Graph.
# -----------------------------------------------------------------------------
collector:
  arm:
    base: "https://management.azure.com"
    endpoints:
      # Azure Advisor вЂ” recomendaГ§Гµes do RG
      advisor_recommendations:
        path: "/subscriptions/{sub}/resourceGroups/{rg}/providers/Microsoft.Advisor/recommendations"
        api: "2023-01-01"
      # InventГЎrio de recursos do RG вЂ” base p/ cruzar resourceId e detectar cascata
      resource_inventory:
        path: "/subscriptions/{sub}/resourceGroups/{rg}/resources"
        api: "2021-04-01"
      # Defender for Cloud вЂ” security assessments (recomendaГ§Гµes). Escopo: subscription;
      # o renderer filtra p/ o RG pelo resourceId. status Unhealthy = recomendaГ§ГЈo aberta.
      mdc_assessments:
        path: "/subscriptions/{sub}/providers/Microsoft.Security/assessments"
        api: "2021-06-01"
      # Defender for Cloud вЂ” secure score (headline opcional; degrada p/ n/a se vazio)
      mdc_secure_score:
        path: "/subscriptions/{sub}/providers/Microsoft.Security/secureScores"
        api: "2020-01-01"

# -----------------------------------------------------------------------------
# RISK BASELINE вЂ” risco de APLICAR (disrupГ§ГЈo) por padrГЈo no tГ­tulo/displayName.
# Match por substring (case-insensitive), primeiro padrГЈo que casar vence.
# Cobre tanto tГ­tulos do Advisor quanto displayNames do Defender for Cloud.
# Sem match в†’ default "low" (a maioria das mudanГ§as de config Г© baixo-disrupГ§ГЈo).
# -----------------------------------------------------------------------------
risk_baseline:
  safe:
    - "enable diagnostic"
    - "enable soft delete"
    - "enable backup"
    - "enable purge protection"
    - "sku upgrade"
    - "upgrade your sku"
    - "enable logging"
    - "configure log"
    - "enable mfa"
    - "auditing should be enabled"
  low:
    - "add nodes"
    - "scale up"
    - "spot"
    - "security hardening"
    - "trusted registries"
    - "install endpoint protection"
    - "apply system updates"
    - "encryption at rest"
    - "should be encrypted"
    - "vulnerabilities should be remediated"
  medium:
    - "nat gateway"
    - "restrict api server"
    - "private link"
    - "private endpoint"
    - "vm series"
    - "node pool"
    - "geo-replication"
    - "network security group"
    - "should restrict network access"
    - "firewall"
    - "public network access should be disabled"
    - "disable public"
  high:
    - "ephemeral os disk"
    - "just-in-time"
    - "restrict access to"
    - "ip forwarding"
    - "management ports should be closed"

risk_emoji: { safe: "рџџў", low: "рџџЎ", medium: "рџџ ", high: "рџ”ґ" }

# -----------------------------------------------------------------------------
# PHASES вЂ” plano de execuГ§ГЈo faseado (reproduzido no relatГіrio).
# -----------------------------------------------------------------------------
phases:
  safe:   { label: "Fase 1 вЂ” Quick wins", emoji: "рџџў", action: "Executar a qualquer hora" }
  low:    { label: "Fase 2 вЂ” Baixo risco", emoji: "рџџЎ", action: "Executar em janela de baixo trГЎfego" }
  medium: { label: "Fase 3 вЂ” Risco mГ©dio", emoji: "рџџ ", action: "Agendar janela de manutenГ§ГЈo" }
  high:   { label: "Fase 4 вЂ” Alto risco",  emoji: "рџ”ґ", action: "AprovaГ§ГЈo + rollback testado obrigatГіrios" }

# Frases reutilizГЎveis (cascata / validaГ§ГЈo) вЂ” preenchidas com o nome do recurso no renderer.
cascade_template: "{resource} muda в†’ workloads dependentes podem reiniciar в†’ validar conectividade pГіs-mudanГ§a"
validation_steps:
  - "Confirmar que {resource} estГЎ em estado de provisionamento 'Succeeded'"
  - "Rodar health checks nos serviГ§os dependentes"
  - "Validar conectividade ponta a ponta a partir do cliente"

# -----------------------------------------------------------------------------
# DELIVERY вЂ” entrega tripla (consistente com a suГ­te).
# -----------------------------------------------------------------------------
delivery:
  subject_prefix: "[Azure Remediation]"
  recipients_key: default_recipients
