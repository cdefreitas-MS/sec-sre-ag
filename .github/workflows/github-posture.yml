name: GitHub Posture Audit

# Roda a skill github-posture (8 domínios, read-only) DENTRO do GitHub Actions, onde já
# existe um token. Dispare manualmente em Actions → "GitHub Posture Audit" → "Run workflow".
#
#   • Token automático (github.token): cobre o repo-level do que a permission abaixo libera.
#   • Para GOVERNANÇA de ORG (2FA, runners, audit streaming) + secret/branch-protection de
#     TODOS os repos: crie um secret `GHP_TOKEN` (PAT fine-grained ou classic) com
#     read:org / security_events / repo. O workflow usa GHP_TOKEN quando existir.
#
# O coletor é token-aware: lê GITHUB_TOKEN do ambiente via REST api.github.com (sem gh CLI).

on:
  workflow_dispatch:
    inputs:
      org:
        description: "Org ou usuário GitHub a auditar (ex.: minha-org)"
        required: true
        type: string
      max_repos:
        description: "Máx. de repositórios a varrer"
        required: false
        default: "100"
        type: string

permissions:
  contents: write          # publica os dados (sanitizados) na branch gh-posture-data p/ o SRE Agent
  security-events: read   # deixa o token automático ler code scanning quando aplicável

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install pyyaml

      - name: Run GitHub Posture
        env:
          # PAT com read:org/security_events se houver; senão o token automático do job.
          GITHUB_TOKEN: ${{ secrets.GHP_TOKEN || github.token }}
        run: |
          python github-posture/generate_html_report.py \
            --org "${{ inputs.org }}" \
            --output out \
            --save-raw \
            --emit-feed out/_feed.json \
            --format both

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: github-posture-${{ inputs.org }}
          path: out/
          if-no-files-found: warn

      # Handoff p/ o SRE Agent (Jeito 1): publica o inventário + feed (SANITIZADOS, sem valor
      # de segredo) numa branch de dados separada. O agente lê de lá com o Code Access dele e
      # renderiza/entrega via --from-json (o token GitHub fica SÓ aqui no Actions).
      - name: Publish data for the SRE Agent (gh-posture-data branch)
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          ORG="${{ inputs.org }}"
          REPO="${{ github.repository }}"
          if [ ! -f out/_raw.json ]; then echo "sem out/_raw.json — nada a publicar"; exit 0; fi
          rm -rf publish && mkdir publish && cd publish
          git init -q
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git"
          if git fetch -q origin gh-posture-data 2>/dev/null; then
            git checkout -q -B gh-posture-data origin/gh-posture-data
          else
            git checkout -q --orphan gh-posture-data
            git rm -rfq . 2>/dev/null || true
          fi
          cp ../out/_raw.json "${ORG}-raw.json"
          cp ../out/_feed.json "${ORG}-feed.json" 2>/dev/null || echo '{"github_secrets":[],"github_oidc":[]}' > "${ORG}-feed.json"
          git add -A
          git commit -q -m "github-posture data: ${ORG} ($(date -u +%FT%TZ))" || { echo "sem mudança"; exit 0; }
          git push -q origin gh-posture-data
          echo "✅ publicado em gh-posture-data: ${ORG}-raw.json + ${ORG}-feed.json"
